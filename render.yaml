services:
  - type: web
    name: stylemart-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci || npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-app.vercel.app
      # Add these in Render dashboard (IMPORTANT):
      # - MONGODB_URI
      # - JWT_SECRET
      # - HF_TOKEN (optional)
