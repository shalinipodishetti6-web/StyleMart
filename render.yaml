services:
  # 🔹 Backend API (Node/Express)
  - type: web
    name: stylemart-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci || npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://stylemart-frontend.onrender.com
      # Add these in Render dashboard (not here):
      # - MONGODB_URI
      # - JWT_SECRET
      # - HF_TOKEN (optional)

  # 🔹 Frontend (Create React App)
  - type: web
    name: stylemart-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci || npm install && npm run build
    startCommand: npx serve -s build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://stylemart-backend.onrender.com
