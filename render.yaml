services:
  # Backend API (Node/Express)
  - type: web
    name: stylemart-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci || npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        fromService:
          name: stylemart-frontend
          type: web   # ✅ FIXED
          property: url

  # Frontend (React)
  - type: web   # ✅ FIXED (was static)
    name: stylemart-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci || npm install && npm run build
    startCommand: npm run preview   # ⚠️ important
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: stylemart-backend
          type: web
          property: url
