services:
  - type: web
    name: stylemart-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci || npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://stylemart-frontend.onrender.com

  - type: web
    name: stylemart-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci || npm install && npm run build
    startCommand: npm run preview
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://stylemart-backend.onrender.com
